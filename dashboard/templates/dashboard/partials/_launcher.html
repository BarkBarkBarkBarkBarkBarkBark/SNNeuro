<!-- _launcher.html — Source launcher bar partial -->
<div id="launcher">
  <div class="launcher-mode">
    <div class="mode-dot" id="mode_dot"></div>
    <span class="mode-label" id="mode_label">idle</span>
  </div>
  <div class="launcher-sep"></div>
  <input type="text" id="file_path" placeholder="/path/to/recording.ncs" spellcheck="false">
  <button id="btn_file">▶ LOAD FILE</button>
  <button id="btn_browse" title="List .ncs files in data/raw/">📂</button>
  <div class="launcher-sep"></div>
  <button id="btn_synthetic">🧪 SYNTHETIC</button>
  <label>dur</label>
  <input type="number" id="synth_dur" value="20" min="1" max="120" step="1">
  <label>units</label>
  <input type="number" id="synth_units" value="2" min="1" max="10" step="1">
  <label>noise</label>
  <input type="number" id="synth_noise" value="8" min="1" max="30" step="1">
  <label>chans</label>
  <input type="number" id="synth_channels" value="{{ num_channels|default:'1' }}" min="1" max="32" step="1">
  <div id="launcher_msg"></div>
</div>
