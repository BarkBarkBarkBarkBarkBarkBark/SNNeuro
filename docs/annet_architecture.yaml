# =============================================================================
#  SECTION 8 — KEY EQUATIONS REFERENCE (for implementors)
# =============================================================================

equations:
  lif_update:
    continuous: "τ_m × dV/dt = −(V − V_reset) + I_syn"
    discrete: "V += (dt / τ_m) × (−(V − V_reset) + I_syn)"
    event_driven: "V(t) = V(t_last) × exp(−Δt / τ_m) + w"
    note: |
      The event-driven form is used in ANNet (no dt loop; update only on
      spike arrival).  For real-time, this is more efficient than Euler
      since we skip silent timesteps.

  mad_noise:
    equation: "σ_noise = median(|x|) / 0.6745"
    online: "Use exponential moving average of |x| for streaming MAD"

  synaptic_depression:
    recovery: "pRel(t) = 1 − (1 − pRel(t_last)) × exp(−Δt / τ_d)"
    depression: "pRel(t) *= (1 − f_d)"
    parameters:
      tau_d: 400  # samples
      f_d: 0.01613

  stdp_l1:
    ltp: "Δw = +A_plus    if t_post − t_pre ≤ window"
    ltd: "Δw = −A_minus   for ALL synapses at post-spike"
    net_causal: "Δw = A_plus − A_minus = +0.00225"
    bounds: "[0, 1]"

  intrinsic_plasticity_l2:
    on_fire: "θ += −0.01 × θ  (multiplicative decrease)"
    on_active_input: "θ += 0.006 × w_eff"
    bounds: "[8, 140]"

# =============================================================================
#  SECTION 9 — RISKS AND MITIGATIONS
# =============================================================================

risks:
  - risk: "Python per-sample overhead at 80 kHz may exceed 5 ms budget"
    likelihood: medium
    mitigation: |
      1. Event-driven updates (not per-sample) dramatically reduce work
      2. NumPy vectorised operations for batch afferent processing
      3. Numba @njit on hot inner loops (encoder shift, LIF update)
      4. Buffer N samples and process in batch if single-sample is too slow
    fallback: "Port hot loops to C extension (like ANNet's MEX files)"

  - risk: "STDP may not converge online with real electrode noise"
    likelihood: low
    mitigation: |
      1. Use calibration period with freeze_stdp=false
      2. DN gating suppresses noise-driven plasticity
      3. MAD-based noise estimation is robust to outliers
      4. Can initialise weights from offline-trained values

  - risk: "Control signal may be too noisy for closed-loop use"
    likelihood: medium
    mitigation: |
      1. DN confidence gating suppresses output during noise
      2. Leaky integrator smooths spike-to-spike jitter
      3. Adjustable window size trades latency for smoothness
      4. Threshold on control signal prevents sub-threshold triggers

  - risk: "UDP packet loss under heavy load"
    likelihood: low
    mitigation: |
      1. UDP is fire-and-forget; acceptable for control signals
      2. Experiment controller should timeout and hold last value
      3. Raw data logging uses a separate reliable channel (file/TCP)
