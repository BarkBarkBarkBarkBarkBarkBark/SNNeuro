# ─────────────────────────────────────────────────────────────────────────────
#  optimization_manifest.yaml — Hyperparameter search space for the SNN agent
#
#  Read by optimize.py to drive an Optuna study.
#  Each parameter maps to a key in config.py's CFG dict.
# ─────────────────────────────────────────────────────────────────────────────

study:
  name: "snn-spike-sorting"
  direction: maximize          # maximize f_half (F₀.₅ precision-weighted metric)
  n_trials: 80                 # total evaluation budget
  n_jobs: 1                    # sequential (GIL prevents true thread parallelism)
  timeout_s: null              # optional wall-clock cap (seconds)
  pruner:
    type: none                 # "median" or "none" (each trial is a single score)
  sampler:
    type: tpe                  # Tree-structured Parzen Estimator

# ── Objective metric ─────────────────────────────────────────────────────────
objective:
  metric: f_half               # F₀.₅ = 1.25·P·R / (0.25P + R) — precision-weighted
  aggregation: mean            # mean across ground-truth units
  delta_time: 2.0              # spike matching tolerance in ms (SI default 0.4)
  score_after_s: 15.0          # train/test split: score only spikes after 15 s
  scenarios:                   # multiple synthetic signals to prevent overfitting
    - {seed: 42,  noise_level: 8.0,  num_units: 2, firing_rates: [6.0, 10.0]}
    - {seed: 137, noise_level: 10.0, num_units: 2, firing_rates: [6.0, 10.0]}
    - {seed: 256, noise_level: 6.0,  num_units: 2, firing_rates: [8.0, 14.0]}
    - {seed: 789, noise_level: 12.0, num_units: 3, firing_rates: [5.0, 8.0, 12.0]}

# ── Synthetic recording (single-scenario, used by snn-evaluate CLI only) ──────
recording:
  duration_s: 20.0
  fs: 30000
  num_units: 2
  firing_rates: [6.0, 10.0]
  noise_level: 8.0
  seed: 42

# ── Search space ─────────────────────────────────────────────────────────────
#  13 curated high-impact parameters (8 original + 5 new).
#  Types:  float  — suggest_float (uniform)
#          log    — suggest_float (log=True)
#          int    — suggest_int
#          bool   — suggest_categorical([True, False])
#
#  Ranges informed by diagnostics: L1 threshold is derived from
#  (l1_dn_weight + enc_overlap × 7) × (1−exp(−step/τ)) / (1−exp(−1/τ))
#  and the membrane must actually reach it (~65-120 current per step,
#  β≈0.61 decay). Small step_size + high dn_weight → reachable threshold.
#
#  NEW PARAMETERS (v2):
#  - inh_duration_ms: post-spike blanking window
#  - inh_strength_threshold: current needed to bypass blanking
#  - ng_process_noise: Kalman filter adaptation speed
#  - ng_inhibit_below_sd: noise gate sensitivity
#  - ng_suppression_factor: max noise suppression strength
#
parameters:
  dn_threshold_factor:
    type: log
    low:  0.15
    high: 0.60
    description: "DN threshold = factor × overlap × window / (1 − e^(−1/τ))"

  l1_dn_weight:
    type: float
    low:  40.0
    high: 120.0
    description: "Excitatory boost from DN spike to all L1 neurons (must help reach threshold)"

  dn_depression_tau:
    type: int
    low:  100
    high: 800
    step: 50
    description: "DN pRel depression time constant (samples) — controls refractory recovery"

  dn_depression_frac:
    type: float
    low:  0.005
    high: 0.05
    description: "DN pRel depression depth per spike — larger = stronger depression"

  l1_stdp_ltp:
    type: log
    low:  0.001
    high: 0.02
    description: "Long-term potentiation amplitude"

  l1_stdp_ltd:
    type: float
    low:  -0.012
    high: -0.0005
    description: "Long-term depression amplitude (negative)"

  enc_overlap:
    type: int
    low:  4
    high: 14
    description: "Amplitude bin overlap factor (lower = fewer afferents = lower threshold)"

  enc_dvm_factor:
    type: float
    low:  1.0
    high: 3.0
    description: "Noise scale factor for RF half-width (dvm = factor × σ)"

  enc_step_size:
    type: int
    low:  2
    high: 4
    description: "Temporal subsampling stride (lower = lower L1 threshold via formula)"

  l1_n_neurons:
    type: int
    low:  20
    high: 120
    step: 10
    description: "Number of L1 template neurons"

  # ── NEW: Inhibition parameters ───────────────────────────────────────
  inh_duration_ms:
    type: float
    low:  1.0
    high: 10.0
    description: "Post-spike blanking window in ms (default 5 ms)"

  inh_strength_threshold:
    type: float
    low:  50.0
    high: 300.0
    description: "Input current magnitude to bypass blanking (strong-signal pass-through)"

  # ── NEW: Noise gate parameters ───────────────────────────────────────
  ng_process_noise:
    type: log
    low:  0.001
    high: 0.1
    description: "Kalman filter process noise Q (adaptation speed — too fast tracks spikes as noise)"

  ng_inhibit_below_sd:
    type: float
    low:  1.2
    high: 3.5
    description: "Suppress when estimated σ < factor × σ_noise (higher = more aggressive gating)"

  ng_suppression_factor:
    type: float
    low:  0.0
    high: 0.3
    description: "Minimum suppression multiplier when fully gating (0 = total block, 0.3 = mild)"

  ng_ema_alpha:
    type: float
    low:  0.05
    high: 0.3
    description: "EMA smoothing alpha for noise gate suppression (higher = faster adaptation to spikes)"

  # ── NEW: DEC layer parameters ────────────────────────────────────────
  dec_dn_window_ms:
    type: float
    low:  0.5
    high: 5.0
    description: "Post-DN integration window for DEC layer (ms) — how long DEC stays active after DN fires"
